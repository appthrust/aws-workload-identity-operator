apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
  annotations:
    cert-manager.io/inject-ca-from: aws-workload-identity-operator-system/aws-workload-identity-operator-serving-cert
webhooks:
- name: vawsworkloadidentityconfig.aws.identity.appthrust.io
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Fail
  matchPolicy: Equivalent
  timeoutSeconds: 10
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-aws-identity-appthrust-io-v1alpha1-awsworkloadidentityconfig
  rules:
  - apiGroups: ["aws.identity.appthrust.io"]
    apiVersions: ["v1alpha1"]
    operations: ["DELETE"]
    resources: ["awsworkloadidentityconfigs"]
- name: vawsserviceaccountrole.aws.identity.appthrust.io
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Fail
  matchPolicy: Equivalent
  timeoutSeconds: 10
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-aws-identity-appthrust-io-v1alpha1-awsserviceaccountrole
  rules:
  - apiGroups: ["aws.identity.appthrust.io"]
    apiVersions: ["v1alpha1"]
    operations: ["CREATE", "UPDATE"]
    resources: ["awsserviceaccountroles"]
- name: vawsserviceaccountrolereplicaset.aws.identity.appthrust.io
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Fail
  matchPolicy: Equivalent
  timeoutSeconds: 10
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-aws-identity-appthrust-io-v1alpha1-awsserviceaccountrolereplicaset
  rules:
  - apiGroups: ["aws.identity.appthrust.io"]
    apiVersions: ["v1alpha1"]
    operations: ["CREATE", "UPDATE"]
    resources: ["awsserviceaccountrolereplicasets"]
