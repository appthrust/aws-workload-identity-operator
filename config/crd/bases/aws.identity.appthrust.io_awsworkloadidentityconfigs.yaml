    listKind: AWSWorkloadIdentityConfigList
    plural: awsworkloadidentityconfigs
    shortNames:
    - awic
    singular: awsworkloadidentityconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.region
      name: Region
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].reason
      name: Reason
      priority: 1
      type: string
    - jsonPath: .status.issuerHostPath
      name: Issuer
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AWSWorkloadIdentityConfig configures namespace-scoped workload
          identity delivery.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AWSWorkloadIdentityConfigSpec defines namespace-scoped workload
              identity delivery.
            properties:
              eksIRSA:
                description: |-
                  EKSIRSA configures native EKS IRSA delivery. It must be present only when
                  spec.type is EKSIRSA.
                properties:
                  issuerURL:
                    description: IssuerURL is the canonical EKS OIDC issuer URL.
                    maxLength: 256
                    minLength: 1
                    pattern: ^https://oidc\.eks\.[a-z]{2,}-[a-z0-9-]+-[0-9]+\.[a-z0-9.-]+/id/[A-Z0-9]+$
                    type: string
                  oidcProvider:
                    description: |-
                      OIDCProvider selects whether the operator manages the IAM OIDC provider
                      ACK resource or uses an externally managed provider ARN.
                    properties:
                      arn:
                        description: ARN is required when management is External and
                          forbidden when management is Managed.
                        maxLength: 2048
                        minLength: 1
                        pattern: ^arn:aws[a-z0-9-]*:iam::[0-9]{12}:oidc-provider/[A-Za-z0-9._~%!$&'()*+,;=:@/-]+$
                        type: string
                      management:
                        description: OIDCProviderManagement selects whether the operator
                          owns the IAM OIDC provider.
                        enum:
                        - Managed
                        - External
                        type: string
                    required:
                    - management
                    type: object
                    x-kubernetes-validations:
                    - message: spec.eksIRSA.oidcProvider.arn must be omitted for Managed
                        and required for External
                      rule: 'self.management == ''Managed'' ? !has(self.arn) : has(self.arn)'
                required:
                - issuerURL
                - oidcProvider
                type: object
                x-kubernetes-validations:
                - message: spec.eksIRSA is immutable
                  rule: self == oldSelf
              region:
                maxLength: 32
                minLength: 1
                pattern: ^[a-z]{2,}-[a-z0-9-]+-[0-9]+$
                type: string
                x-kubernetes-validations:
                - message: spec.region is immutable
                  rule: self == oldSelf
              type:
                description: DeliveryType selects the workload identity delivery strategy.
                enum:
                - SelfHostedIRSA
                - EKSPodIdentity
                - EKSIRSA
                type: string
                x-kubernetes-validations:
                - message: spec.type is immutable
                  rule: self == oldSelf
            required:
            - region
            - type
            type: object
            x-kubernetes-validations:
            - message: spec.eksIRSA must be present exactly when spec.type is EKSIRSA
              rule: has(self.eksIRSA) == (self.type == 'EKSIRSA')
          status:
            description: AWSWorkloadIdentityConfigStatus reports delivery and AWS
              resource state.
            properties:
              ackResources:
                items:
                  description: ACKResourceStatus reports the status copied from an
                    operator-owned ACK child.
                  properties:
                    apiVersion:
                      maxLength: 316
                      minLength: 1
                      type: string
                    conditions:
                      items:
                        description: ACKResourceCondition mirrors the public shape
                          of ACK status conditions.
                        properties:
                          lastTransitionTime:
                            format: date-time
                            type: string
                          message:
                            maxLength: 32768
                            type: string
                          reason:
                            maxLength: 1024
                            type: string
                          status:
                            enum:
                            - "True"
                            - "False"
                            - Unknown
                            type: string
                          type:
                            maxLength: 316
                            minLength: 1
                            pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                            type: string
                        required:
                        - status
                        - type
                        type: object
                      maxItems: 32
                      type: array
                      x-kubernetes-list-map-keys:
                      - type
                      x-kubernetes-list-type: map
                    kind:
                      maxLength: 63
                      minLength: 1
                      type: string
                    name:
                      maxLength: 253
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                    namespace:
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                  required:
                  - apiVersion
                  - kind
                  - name
                  - namespace
                  type: object
                maxItems: 16
                type: array
                x-kubernetes-list-map-keys:
                - apiVersion
                - kind
                - namespace
                - name
                x-kubernetes-list-type: map
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                maxItems: 32
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              issuerHostPath:
                description: |-
                  IssuerHostPath is the public OIDC issuer location written as host plus
                  optional path (no scheme); the scheme is always added by IssuerURL().
                  EKSIRSA emits `oidc.eks.<region>.amazonaws.com/id/<id>`, while
                  SelfHostedIRSA emits `<bucket>.s3.<region>.amazonaws.com`. The host
                  portion is a DNS-1123 subdomain; the optional path may carry RFC 3986
                  pchars and additional slashes.
                maxLength: 2048
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*(/[A-Za-z0-9._~%!$&'()*+,;=:@/-]*)?$
                type: string
              observedGeneration:
                format: int64
                minimum: 0
                type: integer
              oidcProviderARN:
                description: |-
                  OIDCProviderARN is the IAM OpenIDConnectProvider ARN bound to the
                  issuer. The shape mirrors `spec.eksIRSA.oidcProvider.arn` so drift
                  between spec and status is detected at admission time.
                maxLength: 2048
                pattern: ^arn:aws[a-z0-9-]*:iam::[0-9]{12}:oidc-provider/[A-Za-z0-9._~%!$&'()*+,;=:@/-]+$
                type: string
              resolvedClusterName:
                description: |-
                  ResolvedClusterName records the multicluster-runtime cluster identifier
                  used by the latest ready self-hosted inventory resolution. The
                  controller encodes the identifier as `<namespace>/<name>` via
                  `types.NamespacedName.String()`, where both segments are DNS-1123
                  subdomains (and are currently equal — see `logicalClusterName` in
                  `internal/inventory/resolver.go`). The bound covers two maximum-length
                  subdomain segments and the separating slash (253 + 1 + 253).
                maxLength: 507
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                type: string
              selfHostedIssuer:
                description: |-
                  SelfHostedIssuer reports the current self-hosted issuer target and the
                  last S3 publication identity verified by the controller.
                properties:
                  bucketName:
                    description: BucketName is the current desired self-hosted issuer
                      bucket target.
                    maxLength: 63
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  publication:
                    description: |-
                      Publication is the current publication verified in S3. It is nil until
                      the controller confirms the issuer objects are current.
                    properties:
                      bucketName:
                        maxLength: 63
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                        type: string
                      issuerURL:
                        maxLength: 2048
                        minLength: 1
                        pattern: ^https://.+$
                        type: string
                      objectSetDigest:
                        pattern: ^sha256:[0-9a-f]{64}$
                        type: string
                      signingKeyID:
                        maxLength: 128
                        minLength: 1
                        pattern: ^[A-Za-z0-9_-]+$
                        type: string
                    required:
                    - bucketName
                    - issuerURL
                    - objectSetDigest
                    - signingKeyID
                    type: object
                required:
                - bucketName
                type: object
              webhookRuntimeCertNotAfter:
                format: date-time
                type: string
              webhookRuntimeNamespace:
                description: |-
                  WebhookRuntimeNamespace is the workload-cluster namespace where the
                  self-hosted webhook runtime is installed. Kubernetes namespace names
                  are DNS-1123 labels.
                maxLength: 63
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: metadata.name must be default
          rule: self.metadata.name == 'default'
    served: true
    storage: true
    subresources:
      status: {}
