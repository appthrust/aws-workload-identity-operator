version: "2"

linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - cyclop
    - dogsled
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - forcetypeassert
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goprintffuncname
    - gosec
    - govet
    - importas
    - ineffassign
    - makezero
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - nlreturn
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - staticcheck
    - tagliatelle
    - thelper
    - unconvert
    - unparam
    - unused
    - usetesting
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
  exclusions:
    rules:
      # Generated Kubernetes deepcopy code intentionally repeats simple code.
      - path: api/v1alpha1/zz_generated\.deepcopy\.go
        linters:
          - revive
      # These JSON tags are externally defined API contracts rather than
      # project-local naming style: Kubernetes CRDs, IAM policies, OIDC
      # discovery metadata, and pod-identity-webhook config entries.
      - path: (api/v1alpha1/.*|internal/aws/trust_policy\.go|internal/delivery/selfhosted_config\.go|internal/oidc/discovery\.go)
        linters:
          - tagliatelle
  settings:
    gocritic:
      enable-all: true
      disabled-checks:
        - importShadow
        - unnamedResult
    nolintlint:
      require-specific: true
      require-explanation: true
    cyclop:
      max-complexity: 15
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: bool-literal-in-expr

formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - localmodule
