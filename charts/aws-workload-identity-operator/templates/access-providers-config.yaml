apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "awio.clusterInventoryProviderConfigMapName" . }}
  namespace: {{ include "awio.namespace" . }}
  labels:
    {{- include "awio.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  config.json: {{ include "awio.clusterInventoryProviderConfigJSON" . | quote }}
