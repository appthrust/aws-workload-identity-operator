{{- $namespace := include "awio.namespace" . -}}
{{- $serviceName := include "awio.webhookServiceName" . -}}
{{- $secretName := include "awio.webhookTLSSecretName" . -}}
{{- $dnsNames := fromJsonArray (include "awio.webhookDNSNames" .) -}}
{{- $issuerName := printf "%s-selfsigned" (include "awio.fullname" .) -}}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $issuerName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "awio.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "awio.fullname" . }}-webhook
  namespace: {{ $namespace }}
  labels:
    {{- include "awio.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  secretName: {{ $secretName }}
  duration: 87600h
  renewBefore: 720h
  isCA: true
  usages:
    - server auth
  dnsNames:
    {{- range $dnsNames }}
    - {{ . | quote }}
    {{- end }}
  issuerRef:
    name: {{ $issuerName }}
    kind: Issuer
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "awio.fullname" . }}-validating
  labels:
    {{- include "awio.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ printf "%s/%s-webhook" $namespace (include "awio.fullname" .) | quote }}
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
webhooks:
  - name: vawsworkloadidentityconfig.aws.identity.appthrust.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    matchPolicy: Equivalent
    timeoutSeconds: 10
    clientConfig:
      service:
        name: {{ $serviceName }}
        namespace: {{ $namespace }}
        path: /validate-aws-identity-appthrust-io-v1alpha1-awsworkloadidentityconfig
        port: 443
    rules:
      - apiGroups:
          - aws.identity.appthrust.io
        apiVersions:
          - v1alpha1
        operations:
          - DELETE
        resources:
          - awsworkloadidentityconfigs
  - name: vawsserviceaccountrole.aws.identity.appthrust.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    matchPolicy: Equivalent
    timeoutSeconds: 10
    clientConfig:
      service:
        name: {{ $serviceName }}
        namespace: {{ $namespace }}
        path: /validate-aws-identity-appthrust-io-v1alpha1-awsserviceaccountrole
        port: 443
    rules:
      - apiGroups:
          - aws.identity.appthrust.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - awsserviceaccountroles
  - name: vawsworkloadidentityoperatorconfig.aws.identity.appthrust.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    matchPolicy: Equivalent
    timeoutSeconds: 10
    clientConfig:
      service:
        name: {{ $serviceName }}
        namespace: {{ $namespace }}
        path: /validate-aws-identity-appthrust-io-v1alpha1-awsworkloadidentityoperatorconfig
        port: 443
    rules:
      - apiGroups:
          - aws.identity.appthrust.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - awsworkloadidentityoperatorconfigs
