{{- $managedServiceAccount := .Values.ocm.managedServiceAccount | default dict -}}
{{- $remotePermissions := $managedServiceAccount.remotePermissions | default dict -}}
{{- $managedServiceAccountNamespaces := $managedServiceAccount.namespaces | default (list) -}}
{{- if and ($managedServiceAccount.create | default false) (eq (len $managedServiceAccountNamespaces) 0) -}}
{{- fail "ocm.managedServiceAccount.namespaces must be non-empty when chart-managed OCM resources are enabled" -}}
{{- end -}}
{{- $webhookNamespace := include "awio.ocmRemotePermissionsWebhookNamespace" . -}}
{{- $managedServiceAccountName := include "awio.ocmManagedServiceAccountName" . -}}
{{- $remotePermissionsName := include "awio.ocmRemotePermissionsName" . -}}
{{- $remoteServiceAccountNamespace := $managedServiceAccount.addonInstallNamespace -}}
{{- range $namespace := $managedServiceAccountNamespaces }}
{{- if $managedServiceAccount.create }}
{{- $msaLabels := dict -}}
{{- $_ := set $msaLabels "helm.sh/chart" (include "awio.chart" $) -}}
{{- $_ = set $msaLabels "app.kubernetes.io/name" (include "awio.name" $) -}}
{{- $_ = set $msaLabels "app.kubernetes.io/instance" $.Release.Name -}}
{{- $_ = set $msaLabels "app.kubernetes.io/version" ($.Chart.AppVersion | toString) -}}
{{- $_ = set $msaLabels "app.kubernetes.io/managed-by" $.Release.Service -}}
{{- $msaLabels = mergeOverwrite $msaLabels ($.Values.commonLabels | default dict) ($managedServiceAccount.labels | default dict) (dict "authentication.open-cluster-management.io/sync-to-clusterprofile" "true") -}}
{{- $msaAnnotations := mergeOverwrite (dict) ($.Values.commonAnnotations | default dict) ($managedServiceAccount.annotations | default dict) -}}
---
apiVersion: authentication.open-cluster-management.io/v1beta1
kind: ManagedServiceAccount
metadata:
  name: {{ $managedServiceAccountName }}
  namespace: {{ $namespace }}
  labels:
    {{- toYaml $msaLabels | nindent 4 }}
  {{- if $msaAnnotations }}
  annotations:
    {{- toYaml $msaAnnotations | nindent 4 }}
  {{- end }}
spec:
  rotation:
    enabled: {{ $managedServiceAccount.rotation.enabled }}
---
apiVersion: work.open-cluster-management.io/v1
kind: ManifestWork
metadata:
  name: {{ $remotePermissionsName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "awio.labels" $ | nindent 4 }}
  {{- with $.Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  workload:
    manifests:
      - apiVersion: v1
        kind: Namespace
        metadata:
          name: {{ $webhookNamespace }}
          labels:
            {{- include "awio.webhookRuntimeLabels" $ | nindent 12 }}
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: {{ $remotePermissionsName }}
        rules:
          - apiGroups:
              - ""
            resources:
              - serviceaccounts
            verbs:
              - get
              - list
              - watch
              - patch
          - apiGroups:
              - ""
            resources:
              - namespaces
            verbs:
              - get
              - list
              - watch
              - create
              - update
          - apiGroups:
              - ""
            resources:
              - secrets
              - services
            verbs:
              - list
              - watch
          - apiGroups:
              - apps
            resources:
              - deployments
            verbs:
              - list
              - watch
          - apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - roles
              - rolebindings
            verbs:
              - list
              - watch
          - apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - clusterroles
              - clusterrolebindings
            verbs:
              - list
              - watch
              - create
          - apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - clusterroles
              - clusterrolebindings
            resourceNames:
              - pod-identity-webhook
            verbs:
              - get
              - update
              - delete
          - apiGroups:
              - admissionregistration.k8s.io
            resources:
              - mutatingwebhookconfigurations
            verbs:
              - list
              - watch
              - create
          - apiGroups:
              - admissionregistration.k8s.io
            resources:
              - mutatingwebhookconfigurations
            resourceNames:
              - pod-identity-webhook
            verbs:
              - get
              - update
              - delete
          - apiGroups:
              - certificates.k8s.io
            resources:
              - certificatesigningrequests
            verbs:
              - create
              - get
              - list
              - watch
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: {{ $remotePermissionsName }}
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: {{ $remotePermissionsName }}
        subjects:
          - kind: ServiceAccount
            name: {{ $managedServiceAccountName }}
            namespace: {{ $remoteServiceAccountNamespace }}
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: {{ $remotePermissionsName }}
          namespace: {{ $webhookNamespace }}
        rules:
          - apiGroups:
              - ""
            resources:
              - secrets
              - serviceaccounts
              - services
            verbs:
              - create
          - apiGroups:
              - ""
            resources:
              - secrets
            resourceNames:
              - pod-identity-webhook
              - pod-identity-webhook-ca
            verbs:
              - get
              - update
              - patch
              - delete
          - apiGroups:
              - ""
            resources:
              - serviceaccounts
              - services
            resourceNames:
              - pod-identity-webhook
            verbs:
              - get
              - update
              - delete
          - apiGroups:
              - apps
            resources:
              - deployments
            verbs:
              - create
          - apiGroups:
              - apps
            resources:
              - deployments
            resourceNames:
              - pod-identity-webhook
            verbs:
              - get
              - update
              - delete
          - apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - roles
              - rolebindings
            verbs:
              - create
          - apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - roles
              - rolebindings
            resourceNames:
              - pod-identity-webhook
            verbs:
              - get
              - update
              - delete
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: {{ $remotePermissionsName }}
          namespace: {{ $webhookNamespace }}
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: {{ $remotePermissionsName }}
        subjects:
          - kind: ServiceAccount
            name: {{ $managedServiceAccountName }}
            namespace: {{ $remoteServiceAccountNamespace }}
{{- end }}
{{- end }}
