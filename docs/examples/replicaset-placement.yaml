apiVersion: v1
kind: Namespace
metadata:
  name: platform-workloads
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: prod-clusters
  namespace: platform-workloads
spec:
  clusterSets:
    - prod
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            environment: prod
---
apiVersion: aws.identity.appthrust.io/v1alpha1
kind: AWSServiceAccountRoleReplicaSet
metadata:
  name: aws-load-balancer-controller
  namespace: platform-workloads
spec:
  placementRefs:
    - name: prod-clusters
      rolloutStrategy:
        type: All
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: ingress
    spec:
      serviceAccount:
        namespace: kube-system
        name: aws-load-balancer-controller
      policyARNs:
        - arn:aws:iam::aws:policy/ElasticLoadBalancingFullAccess
