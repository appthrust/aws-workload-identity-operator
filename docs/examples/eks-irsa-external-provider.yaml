apiVersion: v1
kind: Namespace
metadata:
  name: eks-prod
---
apiVersion: aws.identity.appthrust.io/v1alpha1
kind: AWSWorkloadIdentityConfig
metadata:
  name: default
  namespace: eks-prod
spec:
  type: EKSIRSA
  region: ap-northeast-1
  eksIRSA:
    issuerURL: https://oidc.eks.ap-northeast-1.amazonaws.com/id/EXAMPLEA1B2C3D4E5F6
    oidcProvider:
      management: External
      arn: arn:aws:iam::123456789012:oidc-provider/oidc.eks.ap-northeast-1.amazonaws.com/id/EXAMPLEA1B2C3D4E5F6
---
apiVersion: aws.identity.appthrust.io/v1alpha1
kind: AWSServiceAccountRole
metadata:
  name: external-dns
  namespace: eks-prod
spec:
  serviceAccount:
    namespace: external-dns
    name: external-dns
  policyARNs:
    - arn:aws:iam::123456789012:policy/external-dns-prod
