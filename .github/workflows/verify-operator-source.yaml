name: Verify operator source

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    name: Test, lint, and verify generated manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout operator
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: make test

      - name: Verify static guardrails
        run: make verify-static

      - name: Verify generated manifests
        run: make verify-generated

      - name: Run golangci-lint
        run: make lint
