name: Publish release artifacts

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aws-workload-identity-operator
  CHART_DIR: charts/aws-workload-identity-operator

jobs:
  tagpr:
    name: Prepare release tag
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      tagpr-tag: ${{ steps.run-tagpr.outputs.tag }}
      release-tag: ${{ steps.resolve-tag.outputs.tag || steps.run-tagpr.outputs.tag }}
    steps:
      - id: resolve-tag
        name: Resolve pushed release tag
        if: github.ref_type == 'tag'
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: github.ref_type != 'tag'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: run-tagpr
        name: Run tagpr
        if: github.ref_type != 'tag'
        uses: Songmu/tagpr@9bbb945b2fb025126186661e27d55485e3fc6df6 # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    name: Validate release chart
    needs: tagpr
    if: needs.tagpr.outputs.release-tag != ''
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.tagpr.outputs.release-tag }}

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Lint default values
        run: helm lint "${CHART_DIR}"

      - name: Lint test values
        run: helm lint "${CHART_DIR}" --values "${CHART_DIR}/values.test.yaml"

      - name: Template default values
        run: |
          helm template "${IMAGE_NAME}" "${CHART_DIR}" \
            --namespace aws-workload-identity-operator-system \
            --hide-notes >/tmp/aws-workload-identity-operator-default.yaml

      - name: Template test values
        run: |
          helm template "${IMAGE_NAME}" "${CHART_DIR}" \
            --namespace aws-workload-identity-operator-system \
            --values "${CHART_DIR}/values.test.yaml" \
            --hide-notes >/tmp/aws-workload-identity-operator-test.yaml

      - name: Package Helm chart
        run: helm package "${CHART_DIR}" --destination /tmp/charts

  operator-image:
    name: Publish operator image
    needs: [tagpr, validate]
    if: needs.tagpr.outputs.release-tag != ''
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.tagpr.outputs.release-tag }}

      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          TAG: ${{ needs.tagpr.outputs.release-tag }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          major_minor="${version%.*}"
          image="${REGISTRY}/${OWNER,,}/${IMAGE_NAME}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${major_minor}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ steps.release.outputs.image }}
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=${{ steps.release.outputs.major_minor }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v2.6.3

      - name: Sign image
        env:
          IMAGE: ${{ steps.release.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes --recursive "${IMAGE}@${DIGEST}"

  helper-images:
    name: Publish ${{ matrix.image }} image
    needs: [tagpr, validate]
    if: needs.tagpr.outputs.release-tag != ''
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: remote-irsa-tools
            target: remote-irsa-tools
          - image: aws-irsa-sidecar
            target: aws-irsa-sidecar
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.tagpr.outputs.release-tag }}

      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          TAG: ${{ needs.tagpr.outputs.release-tag }}
          OWNER: ${{ github.repository_owner }}
          HELPER_IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          major_minor="${version%.*}"
          image="${REGISTRY}/${OWNER,,}/${IMAGE_NAME}/${HELPER_IMAGE}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${major_minor}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ steps.release.outputs.image }}
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=${{ steps.release.outputs.major_minor }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Set up Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v2.6.3

      - name: Sign image
        env:
          IMAGE: ${{ steps.release.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes --recursive "${IMAGE}@${DIGEST}"

  helm-chart:
    name: Publish Helm chart
    needs: [tagpr, validate, operator-image, helper-images]
    if: needs.tagpr.outputs.release-tag != ''
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.tagpr.outputs.release-tag }}

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Resolve chart metadata
        id: chart
        shell: bash
        env:
          TAG: ${{ needs.tagpr.outputs.release-tag }}
          OWNER: ${{ github.repository_owner }}
        run: |
          version="${TAG#v}"
          owner="${OWNER,,}"
          repository="${owner}/${IMAGE_NAME}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "repository=${repository}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR Helm registry
        env:
          HELM_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: echo "${HELM_PASSWORD}" | helm registry login "${REGISTRY}" -u "${GHCR_USER}" --password-stdin

      - name: Log in to GHCR for Cosign
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update chart image repository
        run: |
          sed -Ei "s|^([[:space:]]+repository: ).*$|\\1${{ steps.chart.outputs.repository }}|" "${CHART_DIR}/values.yaml"

      - name: Lint Helm chart
        run: helm lint "${CHART_DIR}"

      - name: Package Helm chart
        run: |
          helm package "${CHART_DIR}" \
            --version "${{ steps.chart.outputs.version }}" \
            --app-version "${{ steps.chart.outputs.version }}"

      - name: Push Helm chart
        id: push-chart
        shell: bash
        run: |
          chart_repository="${REGISTRY}/${{ steps.chart.outputs.owner }}/helm-charts/${IMAGE_NAME}"
          push_output="$(helm push "${IMAGE_NAME}-${{ steps.chart.outputs.version }}.tgz" "oci://${REGISTRY}/${{ steps.chart.outputs.owner }}/helm-charts" 2>&1)"
          printf '%s\n' "${push_output}"
          digest="$(awk '/^Digest:/ {print $2}' <<<"${push_output}" | tail -n1)"
          if [[ -z "${digest}" ]]; then
            echo "failed to resolve pushed chart digest" >&2
            exit 1
          fi
          echo "repository=${chart_repository}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Set up Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v2.6.3

      - name: Sign Helm chart
        env:
          CHART_REPOSITORY: ${{ steps.push-chart.outputs.repository }}
          DIGEST: ${{ steps.push-chart.outputs.digest }}
        run: cosign sign --yes "${CHART_REPOSITORY}@${DIGEST}"
